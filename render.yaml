# Render Blueprint - EduplanerIIC
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: eduplaneriic
    runtime: docker
    # Mismo Dockerfile que suelen detectar los servicios creados desde la raíz del repo (COPY SchoolManager/...)
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free  # o starter, standard según plan
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Postgres (interno). También va en Dockerfile por si el servicio no aplica env del blueprint.
      - key: DATABASE_URL
        value: postgresql://admin:JkIkUXCu2Smlx2XvgppLM603gVvGIAX2@dpg-d7c3impj2pic73bjujs0-a:5432/schoolmanager_hx5i?sslmode=require
      - key: ConnectionStrings__DefaultConnection
        value: "Host=dpg-d7c3impj2pic73bjujs0-a;Port=5432;Database=schoolmanager_hx5i;Username=admin;Password=JkIkUXCu2Smlx2XvgppLM603gVvGIAX2;SSL Mode=Require;Trust Server Certificate=true"
      # Cloudinary (una sola vez en dashboard.cloudinary.com). Válido cualquiera de los dos formatos:
      # - Cloudinary__CloudName / __ApiKey / __ApiSecret  (.NET)
      # - CLOUDINARY_CLOUD_NAME / CLOUDINARY_API_KEY / CLOUDINARY_API_SECRET  (alias soportado por la app)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Firma HMAC de QRs del carnet (mín. 20 chars). Sin esto, StudentIdCard falla al inyectar IQrSignatureService.
      - key: QrSecurity__SecretKey
        generateValue: true
    healthCheckPath: /
